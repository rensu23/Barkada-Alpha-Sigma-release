<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Details | Barkada</title>
  <script>(()=>{const p=localStorage.getItem("barkada-palette")||(localStorage.getItem("barkada-theme")==="light"?"soft-mist":"midnight-teal");document.documentElement.dataset.palette=p;document.documentElement.dataset.theme=p==="soft-mist"?"light":"dark";})();</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="group-details">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="page-header group-detail-header page-section">
          <div class="page-header-copy">
            <p class="eyebrow">Group detail</p>
            <h1 data-group-title>Loading group...</h1>
            <p class="helper-text" data-group-description>Loading group details...</p>
          </div>
          <div class="header-actions">
            <a class="button-secondary" href="./edit-group.html" data-group-edit-link>Edit group</a>
            <button class="button" type="button" data-copy-group-code>Copy group code</button>
          </div>
        </section>
        <section class="group-detail-grid page-section">
          <article class="card group-summary-card">
            <div class="compact-card-header">
              <div>
                <p class="eyebrow">Summary</p>
                <h2>Group summary</h2>
              </div>
              <span class="status-chip status-unpaid" data-group-completion>0%</span>
            </div>
            <div class="progress-track space-top" aria-hidden="true"><span class="progress-fill" data-group-progress></span></div>
            <div class="compact-metric-grid space-top" data-group-meta></div>
          </article>
          <article class="card group-access-card" data-group-tools>
            <div>
              <p class="eyebrow">Access</p>
              <h2>Group access</h2>
            </div>
            <div class="detail-list space-top"></div>
          </article>
          <article class="table-card group-contributions-card">
            <div class="compact-card-header">
              <div>
                <p class="eyebrow">Dues</p>
                <h2>Contributions</h2>
              </div>
            </div>
            <div class="surface-list space-top" data-group-contributions></div>
          </article>
          <article class="table-card group-members-card">
            <div>
              <p class="eyebrow">Roster</p>
              <h2>Members</h2>
            </div>
            <div class="surface-list space-top" data-group-members></div>
          </article>
          <article class="table-card group-payments-card">
            <div class="compact-card-header">
              <div>
                <p class="eyebrow">Payment records</p>
                <h2>Member payment status</h2>
              </div>
            </div>
            <div class="surface-list space-top" data-group-payment-records></div>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";

(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
