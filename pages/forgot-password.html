<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body data-page="forgot-password">
  <div class="public-shell auth-layout">
    <header data-public-header></header>
    <main class="container">
      <section class="auth-card">
        <div class="stack">
          <p class="eyebrow">Password help</p>
          <h1>Forgot your password?</h1>
          <p class="helper-text">Enter your account email before continuing to reset your password.</p>
        </div>
        <form class="stack space-top" data-forgot-form action="../php/auth/forgot-password.php" method="post" novalidate>
          <div class="field-group">
            <label for="forgot-email">Email</label>
            <input id="forgot-email" type="email" name="email" placeholder="you@example.com">
            <p class="error-text" data-error-for="email"></p>
          </div>
          <button class="button button-block" type="submit">Continue to reset password</button>
          <p class="success-text" data-auth-feedback></p>
          <p class="helper-text">Remembered it already? <a class="page-link" href="./login.html">Go back to log in</a>.</p>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";

(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
