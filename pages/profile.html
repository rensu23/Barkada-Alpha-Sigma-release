<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="profile">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="grid-2 page-section">
          <article class="card">
            <p class="eyebrow">Profile</p>
            <div class="page-header space-top">
              <div class="page-header-copy">
                <h1 data-profile-name>Loading profile...</h1>
                <p class="helper-text" data-profile-email>Loading email...</p>
              </div>
              <div class="brand-mark" data-avatar>BR</div>
            </div>
            <div class="detail-list space-top">
              <div class="summary-row"><span>Active role</span><strong data-profile-role>Loading role...</strong></div>
              <div class="summary-row"><span>Active group</span><strong data-profile-group>Loading group...</strong></div>
            </div>
          </article>
          <form class="card stack" data-profile-form action="../php/users/update-profile.php" method="post">
            <h2>Edit profile</h2>
            <div class="field-group"><label>Name<input name="name" type="text"></label></div>
            <div class="field-group"><label>Email<input name="email" type="email"></label></div>
            <button class="button" type="submit">Save profile</button>
          </form>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";

(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
