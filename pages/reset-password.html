<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Barkada</title>
  <script>(()=>{const p=localStorage.getItem("barkada-palette")||(localStorage.getItem("barkada-theme")==="light"?"soft-mist":"midnight-teal");document.documentElement.dataset.palette=p;document.documentElement.dataset.theme=p==="soft-mist"?"light":"dark";})();</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body data-page="reset-password">
  <div class="public-shell auth-layout">
    <header data-public-header></header>
    <main class="container">
      <section class="auth-card">
        <div class="stack">
          <p class="eyebrow">New password</p>
          <h1>Reset your password</h1>
          <p class="helper-text">Use your account email and choose a new password.</p>
        </div>
        <form class="stack space-top" data-reset-form action="../php/auth/reset-password.php" method="post" novalidate>
          <div class="field-group">
            <label for="reset-email">Email</label>
            <input id="reset-email" type="email" name="email" placeholder="Your account email">
            <p class="error-text" data-error-for="email"></p>
          </div>
          <div class="field-group">
            <label for="reset-password">New password</label>
            <div class="input-with-action">
              <input id="reset-password" type="password" name="password" placeholder="Use at least 8 characters">
              <button class="input-action" type="button" data-password-toggle="reset-password">Show</button>
            </div>
            <p class="error-text" data-error-for="password"></p>
          </div>
          <div class="field-group">
            <label for="reset-confirm">Confirm new password</label>
            <div class="input-with-action">
              <input id="reset-confirm" type="password" name="confirm_password" placeholder="Re-enter your new password">
              <button class="input-action" type="button" data-password-toggle="reset-confirm">Show</button>
            </div>
            <p class="error-text" data-error-for="confirm_password"></p>
          </div>
          <button class="button button-block" type="submit">Save new password</button>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";

(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
