<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Barkada</title>
  <script>(()=>{const p=localStorage.getItem("barkada-palette")||(localStorage.getItem("barkada-theme")==="light"?"soft-mist":"midnight-teal");document.documentElement.dataset.palette=p;document.documentElement.dataset.theme=p==="soft-mist"?"light":"dark";})();</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="settings">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="account-settings page-section">
          <article class="card stack account-card">
            <div class="page-header compact-card-header">
              <div class="page-header-copy">
                <p class="eyebrow">Account</p>
                <h1>Settings</h1>
                <p class="helper-text">Profile, preferences, and account tools live here.</p>
              </div>
              <button class="button-danger account-logout" type="button" data-logout>Log out</button>
            </div>
            <form class="settings-profile-form" data-settings-profile-form action="../php/users/update-profile.php" method="post">
              <div class="field-group"><label>Name<input name="name" type="text"></label></div>
              <div class="field-group"><label>Email<input name="email" type="email"></label></div>
              <button class="button" type="submit">Save profile</button>
            </form>
            <div class="account-tools-list">
              <div class="summary-row"><span>Active role</span><strong data-settings-role>Loading role...</strong></div>
              <div class="summary-row"><span>Active group</span><strong data-settings-group>Loading group...</strong></div>
              <div class="summary-row"><span>Password reset</span><strong>Available from the login page</strong></div>
            </div>
            <section class="settings-palette-section" aria-labelledby="palette-heading">
              <div class="settings-section-heading">
                <div>
                  <h2 id="palette-heading">Color palette</h2>
                  <p class="helper-text">Choose the look of your dashboard.</p>
                </div>
                <strong data-current-palette>Midnight Teal</strong>
              </div>
              <div class="palette-grid" data-palette-options></div>
            </section>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";
(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
