<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="settings">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="grid-2 page-section">
          <article class="card stack">
            <p class="eyebrow">Preferences</p>
            <h1>Settings</h1>
            <div class="field-group">
              <label for="role-switch">Current account role</label>
              <select id="role-switch" data-role-switch>
                <option value="treasurer">Treasurer / Admin</option>
                <option value="member">Member</option>
                <option value="hybrid">Hybrid</option>
              </select>
            </div>
            <p class="helper-text">Your role comes from your membership in the active group.</p>
            <button class="button-secondary" type="button" data-theme-toggle><span data-theme-label>Dark mode</span></button>
            <a class="button-secondary" href="./profile.html">Open profile</a>
            <div class="accordion">
              <button type="button">Notification preferences</button>
              <div class="accordion-content">
                <p class="helper-text">UI shell only. Store preferences only after the schema supports them.</p>
              </div>
            </div>
          </article>
          <article class="card stack">
            <h2>Account tools</h2>
            <div class="detail-list">
              <div class="summary-row"><span>Password reset</span><strong>Available from the login page</strong></div>
              <div class="summary-row"><span>Profile</span><strong>Name and email can be updated anytime</strong></div>
            </div>
            <button class="button-danger" type="button" data-logout>Log out</button>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";
(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
