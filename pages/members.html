<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members | Barkada</title>
  <script>(()=>{const p=localStorage.getItem("barkada-palette")||(localStorage.getItem("barkada-theme")==="light"?"soft-mist":"midnight-teal");document.documentElement.dataset.palette=p;document.documentElement.dataset.theme=p==="soft-mist"?"light":"dark";})();</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="members">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="page-header page-section">
          <div class="page-header-copy">
            <p class="eyebrow">Members</p>
            <h1>Member list and quick filters</h1>
            <p class="helper-text">View members and payment summaries for the active group.</p>
          </div>
        </section>
        <section class="card page-section">
          <div class="filter-bar">
            <div class="field-group">
              <label for="members-search">Search members</label>
              <input id="members-search" type="search" data-members-search placeholder="Search by name or email">
            </div>
            <div class="field-group">
              <label for="members-role-filter">Role filter</label>
              <select id="members-role-filter" data-members-role-filter><option>All</option><option>Treasurer</option><option>Member</option></select>
            </div>
            <div class="field-group">
              <label for="members-status-filter">Payment status filter</label>
              <select id="members-status-filter" data-members-status-filter><option>All</option><option>Paid</option><option>Pending</option><option>Not Paid</option><option>Rejected</option></select>
            </div>
          </div>
          <div class="inline-actions space-top">
            <button class="button-secondary" type="button" data-members-clear>Clear filters</button>
            <p class="helper-text" data-members-count></p>
          </div>
        </section>
        <section class="member-list page-section" data-members-list></section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js">
    import { checkAuth } from "./js/services/auth.service.js";

(async () => {
    const res = await checkAuth();

    if (!res.logged_in) {
        window.location.href = "login.html";
    }
})();
  </script>
</body>
</html>
